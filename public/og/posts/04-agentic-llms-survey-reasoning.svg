    <line x1="1130" y1="40" x2="1130" y2="660" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="1230" y1="40" x2="1230" y2="660" stroke="#111" stroke-width="1" opacity="0.08"/>
