<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="1600" height="700">
  <rect width="1600" height="700" fill="#fff"/>
  <!-- divider -->
  <line x1="533" y1="40" x2="533" y2="660" stroke="#111" stroke-width="1"/>
  <!-- top border -->
  <line x1="40" y1="40" x2="1560" y2="40" stroke="#111" stroke-width="3"/>
  <!-- bottom border -->
  <line x1="40" y1="660" x2="1560" y2="660" stroke="#111" stroke-width="1"/>

  <!-- LEFT PANEL -->
  <!-- eyebrow label -->
  <text x="60" y="90" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#111" letter-spacing="4" text-anchor="start" font-weight="400">POSTS · 01</text>
  <!-- accent rule -->
  <line x1="60" y1="102" x2="180" y2="102" stroke="#1abdc7" stroke-width="3"/>
  <!-- title -->
  <text x="60" y="170" font-family="'Pretendard', sans-serif" font-size="38" fill="#111" font-weight="700">Deep Reinforcement</text>
  <text x="60" y="218" font-family="'Pretendard', sans-serif" font-size="38" fill="#111" font-weight="700">Learning from</text>
  <text x="60" y="266" font-family="'Pretendard', sans-serif" font-size="38" fill="#111" font-weight="700">Human Preferences</text>
  <!-- tag line -->
  <text x="60" y="340" font-family="'Pretendard', monospace, sans-serif" font-size="13" fill="#1abdc7" letter-spacing="2">RLHF · REINFORCEMENT LEARNING</text>
  <!-- date -->
  <text x="60" y="640" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#888" letter-spacing="2">2025-11-18</text>

  <!-- RIGHT PANEL: diagonal grid pattern -->
  <g clip-path="url(#rp01)">
    <clipPath id="rp01"><rect x="533" y="40" width="1027" height="620"/></clipPath>
    <!-- diagonal lines -->
    <line x1="533" y1="700" x2="1233" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="633" y1="700" x2="1333" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="733" y1="700" x2="1433" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="833" y1="700" x2="1533" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="933" y1="700" x2="1633" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="1033" y1="700" x2="1733" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <line x1="1133" y1="700" x2="1833" y2="0" stroke="#1abdc7" stroke-width="1" opacity="0.3"/>
    <!-- reverse diagonal lines -->
    <line x1="533" y1="0" x2="1233" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="633" y1="0" x2="1333" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="733" y1="0" x2="1433" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="833" y1="0" x2="1533" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="933" y1="0" x2="1633" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <line x1="1033" y1="0" x2="1733" y2="700" stroke="#111" stroke-width="1" opacity="0.08"/>
    <!-- large accent circle -->
    <circle cx="1180" cy="350" r="200" fill="none" stroke="#1abdc7" stroke-width="3"/>
    <circle cx="1180" cy="350" r="140" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="1180" cy="350" r="60" fill="#1abdc7" opacity="0.15"/>
    <!-- center dot -->
    <circle cx="1180" cy="350" r="8" fill="#1abdc7"/>
  </g>
