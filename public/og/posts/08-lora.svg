<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="1600" height="700">
  <rect width="1600" height="700" fill="#fff"/>
  <line x1="533" y1="40" x2="533" y2="660" stroke="#111" stroke-width="1"/>
  <line x1="40" y1="40" x2="1560" y2="40" stroke="#111" stroke-width="3"/>
  <line x1="40" y1="660" x2="1560" y2="660" stroke="#111" stroke-width="1"/>

  <!-- LEFT PANEL -->
  <text x="60" y="90" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#111" letter-spacing="4">POSTS · 08</text>
  <line x1="60" y1="102" x2="180" y2="102" stroke="#1abdc7" stroke-width="3"/>
  <text x="60" y="170" font-family="'Pretendard', sans-serif" font-size="38" fill="#111" font-weight="700">LoRA</text>
  <text x="60" y="218" font-family="'Pretendard', sans-serif" font-size="30" fill="#111" font-weight="700">Low-Rank Adaptation of</text>
  <text x="60" y="258" font-family="'Pretendard', sans-serif" font-size="30" fill="#111" font-weight="700">Large Language Models</text>
  <text x="60" y="330" font-family="'Pretendard', monospace, sans-serif" font-size="13" fill="#1abdc7" letter-spacing="2">NLP · FINE-TUNING · LOW-RANK</text>
  <text x="60" y="640" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#888" letter-spacing="2">2025-11-26</text>

  <!-- RIGHT PANEL: matrix decomposition visual -->
  <g clip-path="url(#rp08)">
    <clipPath id="rp08"><rect x="533" y="40" width="1027" height="620"/></clipPath>
    <!-- W matrix (large) -->
    <rect x="600" y="200" width="200" height="300" fill="none" stroke="#111" stroke-width="3"/>
    <!-- matrix cells -->
    <line x1="640" y1="200" x2="640" y2="500" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="680" y1="200" x2="680" y2="500" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="720" y1="200" x2="720" y2="500" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="760" y1="200" x2="760" y2="500" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="260" x2="800" y2="260" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="320" x2="800" y2="320" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="380" x2="800" y2="380" stroke="#111" stroke-width="1" opacity="0.2"/>
    <line x1="600" y1="440" x2="800" y2="440" stroke="#111" stroke-width="1" opacity="0.2"/>
    <text x="700" y="560" font-family="'Pretendard', monospace, sans-serif" font-size="13" fill="#111" text-anchor="middle" letter-spacing="1">W₀</text>
    <!-- equals sign -->
    <line x1="830" y1="340" x2="870" y2="340" stroke="#111" stroke-width="2"/>
    <line x1="830" y1="360" x2="870" y2="360" stroke="#111" stroke-width="2"/>
    <!-- plus chain: W₀ + BA -->
    <!-- B matrix (tall narrow) -->
    <rect x="900" y="200" width="80" height="300" fill="#1abdc7" opacity="0.15" stroke="#1abdc7" stroke-width="3"/>
    <line x1="900" y1="260" x2="980" y2="260" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <line x1="900" y1="320" x2="980" y2="320" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <line x1="900" y1="380" x2="980" y2="380" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <line x1="900" y1="440" x2="980" y2="440" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <text x="940" y="560" font-family="'Pretendard', monospace, sans-serif" font-size="13" fill="#1abdc7" text-anchor="middle" letter-spacing="1">B</text>
    <!-- multiply sign -->
    <text x="1010" y="358" font-family="monospace" font-size="20" fill="#111" text-anchor="middle">×</text>
    <!-- A matrix (short wide) -->
    <rect x="1040" y="300" width="200" height="100" fill="#1abdc7" opacity="0.15" stroke="#1abdc7" stroke-width="3"/>
    <line x1="1100" y1="300" x2="1100" y2="400" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <line x1="1160" y1="300" x2="1160" y2="400" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <line x1="1220" y1="300" x2="1220" y2="400" stroke="#1abdc7" stroke-width="1" opacity="0.4"/>
    <text x="1140" y="430" font-family="'Pretendard', monospace, sans-serif" font-size="13" fill="#1abdc7" text-anchor="middle" letter-spacing="1">A</text>
    <!-- rank label -->
    <text x="940" y="140" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">rank r ≪ d</text>
  </g>
</svg>
