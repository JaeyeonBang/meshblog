  <line x1="40" y1="40" x2="1560" y2="40" stroke="#111" stroke-width="3"/>
  <line x1="40" y1="660" x2="1560" y2="660" stroke="#111" stroke-width="1"/>

  <!-- LEFT PANEL -->
  <text x="60" y="90" font-family="'Pretendard', monospace, sans-serif" font-size="11" fill="#111" letter-spacing="4">POSTS · 05</text>
