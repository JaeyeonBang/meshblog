    <!-- input token circles bottom -->
    <circle cx="630" cy="500" r="20" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="680" cy="500" r="20" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="730" cy="500" r="20" fill="none" stroke="#111" stroke-width="1"/>
    <circle cx="780" cy="500" r="20" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="630" y1="480" x2="660" y2="430" stroke="#111" stroke-width="1" opacity="0.3"/>
    <line x1="680" y1="480" x2="700" y2="430" stroke="#111" stroke-width="1" opacity="0.3"/>
